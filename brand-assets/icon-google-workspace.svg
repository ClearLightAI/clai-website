<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 96 96" width="96" height="96">
  <!-- Google Workspace profile photo: 96x96px -->
  <defs>
    <radialGradient id="bg-gw" cx="50%" cy="70%" r="70%">
      <stop offset="0%" stop-color="#1a1555"/>
      <stop offset="100%" stop-color="#13123b"/>
    </radialGradient>
    <linearGradient id="arc-gw" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#4b9ed7"/>
      <stop offset="50%" stop-color="#725ba7"/>
      <stop offset="100%" stop-color="#4b9ed7"/>
    </linearGradient>
    <radialGradient id="glow-gw" cx="50%" cy="0%" r="60%">
      <stop offset="0%" stop-color="#e5b673" stop-opacity="0.9"/>
      <stop offset="40%" stop-color="#e5b673" stop-opacity="0.3"/>
      <stop offset="100%" stop-color="#e5b673" stop-opacity="0"/>
    </radialGradient>
    <clipPath id="circle-gw">
      <circle cx="48" cy="48" r="48"/>
    </clipPath>
  </defs>

  <g clip-path="url(#circle-gw)">
    <rect width="96" height="96" fill="url(#bg-gw)"/>

    <!-- Golden glow at horizon -->
    <ellipse cx="48" cy="62" rx="36" ry="20" fill="url(#glow-gw)"/>

    <!-- Light rays (simplified for small size) -->
    <g opacity="0.35">
      <line x1="48" y1="62" x2="48" y2="18" stroke="#e5b673" stroke-width="1" opacity="0.5"/>
      <line x1="48" y1="62" x2="36" y2="22" stroke="#e5b673" stroke-width="0.6" opacity="0.3"/>
      <line x1="48" y1="62" x2="60" y2="22" stroke="#e5b673" stroke-width="0.6" opacity="0.3"/>
    </g>

    <!-- Horizon arc -->
    <ellipse cx="48" cy="98" rx="60" ry="38" fill="none" stroke="url(#arc-gw)" stroke-width="2" opacity="0.9"/>

    <!-- CL monogram -->
    <text x="48" y="54" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-weight="300" font-size="26" fill="#ffffff" letter-spacing="2" opacity="0.95">CL</text>
  </g>
</svg>
